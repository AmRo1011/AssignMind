<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssignMind — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #71717a; max-width: 400px; margin: 0 auto; }
        button {
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div>
        <h1>You're Offline</h1>
        <p>AssignMind requires an internet connection. Please check your network and try again.</p>
        <button onclick="window.location.reload()">Retry</button>
    </div>
</body>
</html>
